<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعاء شامل كامل</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d1f15;
    --bg2:      #122019;
    --card:     #172a1e;
    --card2:    #1c3224;
    --border:   #2d5a3d;
    --gold:     #c9a84c;
    --gold2:    #e8c97a;
    --gold3:    #f7e4a8;
    --green:    #3a9c6a;
    --green2:   #52c98d;
    --text:     #eef5ec;
    --text2:    #b5d4bc;
    --src:      #c9a84c99;
    --radius:   16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Naskh Arabic', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── ambient glow ── */
  body::before {
    content:'';
    position:fixed; top:-200px; left:50%;
    transform:translateX(-50%);
    width:700px; height:500px;
    background: radial-gradient(ellipse, #1e5c3a44 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }

  /* ── header ── */
  header {
    text-align:center;
    padding: 48px 20px 32px;
    position:relative; z-index:1;
  }
  .basmala {
    font-family:'Noto Kufi Arabic', serif;
    font-size: clamp(26px, 6vw, 42px);
    color: var(--gold2);
    letter-spacing:.02em;
    margin-bottom:16px;
    text-shadow: 0 0 40px #c9a84c55;
  }
  .main-title {
    font-family:'Noto Kufi Arabic', serif;
    font-size: clamp(20px, 4.5vw, 32px);
    color: var(--text);
    margin-bottom:8px;
  }
  .sub-title {
    font-size: 14px;
    color: var(--text2);
    margin-bottom:28px;
  }
  .ornament {
    display:flex; align-items:center; justify-content:center;
    gap:12px; margin:0 auto 8px;
    max-width:420px;
  }
  .ornament-line { flex:1; height:1px; background:linear-gradient(to left,transparent,var(--gold),transparent); }
  .ornament-diamond {
    width:10px; height:10px;
    background:var(--gold); transform:rotate(45deg);
    box-shadow: 0 0 10px var(--gold);
  }

  /* ── nav tabs ── */
  .nav-wrap {
    position:sticky; top:0; z-index:100;
    background: linear-gradient(to bottom, var(--bg) 80%, transparent);
    padding: 12px 0 8px;
  }
  .nav-tabs {
    display:flex; gap:8px; overflow-x:auto; padding:0 16px;
    scrollbar-width:none;
    justify-content: flex-start;
  }
  .nav-tabs::-webkit-scrollbar { display:none; }
  .tab-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family:'Noto Naskh Arabic', serif;
    font-size:13px;
    padding:7px 16px;
    border-radius:50px;
    cursor:pointer;
    white-space:nowrap;
    transition:.2s;
    flex-shrink:0;
  }
  .tab-btn:hover { border-color:var(--gold); color:var(--gold3); }
  .tab-btn.active {
    background:linear-gradient(135deg,#1e5c3a,#0f3321);
    border-color:var(--gold);
    color:var(--gold2);
    box-shadow: 0 0 16px #c9a84c33;
  }

  /* ── sections ── */
  .section { display:none; padding:16px; max-width:780px; margin:0 auto; }
  .section.active { display:block; }

  /* ── section header ── */
  .sec-header {
    text-align:center;
    padding:14px 20px;
    background:linear-gradient(135deg,#1a4d2e,#0f2d1a);
    border:1px solid var(--gold);
    border-radius:var(--radius);
    margin-bottom:20px;
    font-family:'Noto Kufi Arabic', serif;
    font-size: clamp(15px, 3vw, 19px);
    color: var(--gold3);
    box-shadow: 0 0 24px #c9a84c22;
  }

  /* ── dua card ── */
  .dua-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px 16px;
    margin-bottom:16px;
    transition: border-color .2s, box-shadow .2s;
    position:relative;
  }
  .dua-card:hover { border-color:#3d7a54; box-shadow: 0 4px 24px #00000044; }
  .dua-text {
    font-size: clamp(15px, 2.8vw, 18px);
    line-height: 2.1;
    color: var(--text);
    margin-bottom:10px;
    text-align:right;
  }
  .dua-source {
    font-size:12px;
    color: var(--gold);
    text-align:center;
    opacity:.8;
    padding-top:8px;
    border-top:1px solid #2d5a3d55;
  }

  /* ── TASBIH SECTION ── */
  .tasbih-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap:16px;
  }
  .tasbih-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px;
    display:flex; flex-direction:column; align-items:center; gap:14px;
    transition:.2s;
  }
  .tasbih-card:hover { border-color:var(--gold); }
  .tasbih-label {
    font-family:'Noto Kufi Arabic', serif;
    font-size: clamp(15px,3vw,19px);
    color:var(--gold3);
    text-align:center;
    line-height:1.8;
  }
  .tasbih-sublabel {
    font-size:12px; color:var(--text2); text-align:center;
    margin-top:-8px;
  }
  .counter-wrap {
    display:flex; align-items:center; gap:16px;
  }
  .counter-num {
    font-family:'Noto Kufi Arabic',serif;
    font-size: clamp(40px,9vw,64px);
    color:var(--gold2);
    min-width:80px;
    text-align:center;
    text-shadow:0 0 30px #c9a84c66;
    transition: transform .1s, color .1s;
    line-height:1;
  }
  .counter-num.pop {
    transform:scale(1.15);
    color:var(--gold3);
  }
  .btn-count {
    width:62px; height:62px;
    background:linear-gradient(135deg,#1e5c3a,#0f3321);
    border:2px solid var(--gold);
    border-radius:50%;
    color:var(--gold2);
    font-size:28px;
    cursor:pointer;
    transition:.15s;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 16px #c9a84c33;
    flex-shrink:0;
    user-select:none;
  }
  .btn-count:hover { background:linear-gradient(135deg,#255e3d,#1a4028); box-shadow:0 0 24px #c9a84c55; }
  .btn-count:active { transform:scale(.93); }
  .tasbih-footer {
    display:flex; align-items:center; gap:8px; width:100%;
    justify-content:space-between;
  }
  .progress-bar-wrap {
    flex:1; height:6px;
    background:#1c3224; border-radius:10px; overflow:hidden;
  }
  .progress-bar {
    height:100%; background:linear-gradient(to left,var(--gold),var(--green2));
    border-radius:10px; transition:width .3s;
    width:0%;
  }
  .btn-reset {
    background:none; border:1px solid #2d5a3d;
    color:var(--text2); font-family:'Noto Naskh Arabic',serif;
    font-size:12px; padding:4px 12px; border-radius:50px; cursor:pointer;
    transition:.2s; flex-shrink:0;
  }
  .btn-reset:hover { border-color:var(--gold); color:var(--gold); }
  .target-label {
    font-size:11px; color:var(--text2);
  }
  .complete-badge {
    display:none;
    background:linear-gradient(135deg,#1e5c3a,#0f3321);
    border:1px solid var(--gold);
    border-radius:50px;
    padding:4px 14px;
    font-size:12px; color:var(--gold2);
    animation:fadeIn .3s;
  }
  @keyframes fadeIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }

  /* ── responsive ── */
  @media(max-width:500px){
    .tasbih-grid { grid-template-columns:1fr; }
    header { padding:32px 16px 20px; }
  }

  /* ── scrollbar ── */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:#0d1f15; }
  ::-webkit-scrollbar-thumb { background:#2d5a3d; border-radius:4px; }
</style>
</head>
<body>

<header>
  <div class="basmala">﷽</div>
  <div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>
  <h1 class="main-title">دعاءٌ شاملٌ كامل</h1>
  <p class="sub-title">في الدُّنيا والآخرة — للمسلم في كلِّ حال</p>
  <div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>
</header>

<div class="nav-wrap">
  <div class="nav-tabs" id="navTabs"></div>
</div>

<main id="mainContent"></main>

<script>
const SECTIONS = [
  {
    id:'hamd', label:'الحمد والثناء',
    title:'— الحمدُ والثَّناءُ على الله تعالى —',
    duas:[
      { text:'اللهمَّ لك الحمدُ كلُّه، ولك الشُّكرُ كلُّه، ولك المُلكُ كلُّه،\nوبيدك الخيرُ كلُّه، وإليك يَرجعُ الأمرُ كلُّه،\nأنت الأوَّل فلا شيءَ قبلك، والآخرُ فلا شيءَ بعدك،\nوالظَّاهرُ فلا شيءَ فوقك، والباطنُ فلا شيءَ دونك.', src:'صحيح مسلم' },
      { text:'الحمدُ لله ربِّ العالمين حمدًا كثيرًا طيِّبًا مباركًا فيه،\nكما يُحبُّ ربُّنا ويَرضى، وكما ينبغي لجلال وجهه وعظيم سلطانه.', src:'' },
      { text:'سبحانك اللهمَّ وبحمدك، وتباركَ اسمُك، وتعالى جَدُّك، ولا إله غيرك.', src:'' },
      { text:'اللهمَّ لك الحمدُ ملءَ السَّماوات وملءَ الأرض،\nوملءَ ما شئتَ من شيءٍ بعد،\nلا مانعَ لما أعطيت ولا مُعطيَ لما منعت،\nولا ينفعُ ذا الجَدِّ منك الجَدُّ.', src:'متفق عليه' },
    ]
  },
  {
    id:'salah', label:'الصلاة على النبي',
    title:'— الصَّلاةُ والسَّلامُ على النَّبيِّ ﷺ —',
    duas:[
      { text:'اللهمَّ صلِّ على محمَّد وعلى آل محمَّد،\nكما صلَّيتَ على إبراهيم وعلى آل إبراهيم إنَّك حميدٌ مجيد،\nاللهمَّ بارك على محمَّد وعلى آل محمَّد،\nكما باركتَ على إبراهيم وعلى آل إبراهيم إنَّك حميدٌ مجيد.', src:'متفق عليه' },

    ]
  },
  {

    title:'— الاستغفارُ والتَّوبةُ إلى الله —',
    duas:[
      { text:'أستغفرُ اللهَ العظيمَ الذي لا إله إلا هو الحيُّ القيُّومُ وأتوبُ إليه.', src:'صحيح الترمذي — سيِّد الاستغفار' },
      { text:'اللهمَّ اغفر لي ذنوبي كلَّها، دقَّها وجلَّها، أوَّلها وآخرها،\nما علمتُ منها وما لم أعلم، وما أسررتُ وما أعلنت،\nوما أسرفتُ في أمري، أنت المُقدِّم وأنت المُؤخِّر وأنت على كلِّ شيءٍ قدير.', src:'صحيح مسلم' },

  {

  {

  {
    id:'faraj', label:'الفرج وكشف الكرب',

// ── build tabs & sections ──────────────────────────────────────────
const navEl  = document.getElementById('navTabs');
const mainEl = document.getElementById('mainContent');
const counters = {};

SECTIONS.forEach((sec, si) => {
  // tab
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (si===0?' active':'');
  btn.textContent = sec.label;
  btn.onclick = () => switchTab(sec.id);
  navEl.appendChild(btn);

  // section div
  const div = document.createElement('div');
  div.className = 'section' + (si===0?' active':'');
  div.id = 'sec-' + sec.id;

  const hdr = document.createElement('div');
  hdr.className = 'sec-header';
  hdr.textContent = sec.title;
  div.appendChild(hdr);

  if (sec.type === 'tasbih') {
    const grid = document.createElement('div');
    grid.className = 'tasbih-grid';
    sec.items.forEach((item, ii) => {
      const key = sec.id + '-' + ii;
      counters[key] = 0;
      grid.appendChild(buildTasbihCard(item, key));
    });
    div.appendChild(grid);
  } else {
    sec.duas.forEach(d => {
      const card = document.createElement('div');
      card.className = 'dua-card';
      const txt = document.createElement('div');
      txt.className = 'dua-text';
      txt.innerHTML = d.text.replace(/\n/g,'<br>');
      card.appendChild(txt);
      if (d.src) {
        const src = document.createElement('div');
        src.className = 'dua-source';
        src.textContent = d.src;
        card.appendChild(src);
      }
      div.appendChild(card);
    });
  }
  mainEl.appendChild(div);
});

function buildTasbihCard(item, key) {
  const card = document.createElement('div');
  card.className = 'tasbih-card';

  const lbl = document.createElement('div');
  lbl.className = 'tasbih-label';
  lbl.innerHTML = item.text.replace(/\n/g,'<br>');
  card.appendChild(lbl);

  const sub = document.createElement('div');
  sub.className = 'tasbih-sublabel';
  sub.textContent = item.note + ' — ' + item.src;
  card.appendChild(sub);

  const cw = document.createElement('div');
  cw.className = 'counter-wrap';

  const num = document.createElement('div');
  num.className = 'counter-num';
  num.id = 'num-' + key;
  num.textContent = '٠';

  const btn = document.createElement('button');
  btn.className = 'btn-count';
  btn.innerHTML = '+';
  btn.setAttribute('aria-label', 'عَدَّ');
  btn.onclick = () => increment(key, item.target, num, bar, badge);

  cw.appendChild(num);
  cw.appendChild(btn);
  card.appendChild(cw);

  const foot = document.createElement('div');
  foot.className = 'tasbih-footer';

  const pbw = document.createElement('div');
  pbw.className = 'progress-bar-wrap';
  const bar = document.createElement('div');
  bar.className = 'progress-bar';
  bar.id = 'bar-' + key;
  pbw.appendChild(bar);

  const tgt = document.createElement('span');
  tgt.className = 'target-label';
  tgt.textContent = '/ ' + toArabicNum(item.target);

  const badge = document.createElement('div');
  badge.className = 'complete-badge';
  badge.id = 'badge-' + key;
  badge.textContent = '✓ اكتمل';

  const rst = document.createElement('button');
  rst.className = 'btn-reset';
  rst.textContent = 'إعادة';
  rst.onclick = () => reset(key, num, bar, badge);

  foot.appendChild(rst);
  foot.appendChild(badge);
  foot.appendChild(tgt);
  foot.appendChild(pbw);
  card.appendChild(foot);
  return card;
}

function toArabicNum(n) {
  return n.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

function increment(key, target, numEl, barEl, badgeEl) {
  counters[key]++;
  numEl.textContent = toArabicNum(counters[key]);
  numEl.classList.remove('pop');
  void numEl.offsetWidth;
  numEl.classList.add('pop');
  setTimeout(()=>numEl.classList.remove('pop'),120);

  const pct = Math.min(100, (counters[key]/target)*100);
  barEl.style.width = pct + '%';

  if (counters[key] >= target) {
    badgeEl.style.display = 'inline-block';
    // vibrate on mobile
    if (navigator.vibrate) navigator.vibrate([30,20,30]);
  }
}

function reset(key, numEl, barEl, badgeEl) {
  counters[key] = 0;
  numEl.textContent = '٠';
  barEl.style.width = '0%';
  badgeEl.style.display = 'none';
}

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', SECTIONS[i].id === id);
  });
  document.querySelectorAll('.section').forEach(s => {
    s.classList.toggle('active', s.id === 'sec-'+id);
  });
  // scroll active tab into view
  const idx = SECTIONS.findIndex(s=>s.id===id);
  navEl.children[idx]?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
