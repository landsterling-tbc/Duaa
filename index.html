<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ربنا يجعله خير — دعاء شامل كامل مع عدّاد للتسبيح والأذكار">
<title>ربنا يجعله خير</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  /* قيم الوضع الليلي (الافتراضي) */
  --bg: #0a1810;
  --card: #132318;
  --border: #2d5a3d;
  --gold: #c9a574;
  --gold-dark: #8b6f47;
  --gold-light: #d4b896;
  --text: #e8f1e6;
  --text-muted: #a8c2a6;
  --accent: #3a9c6a;
  --green-1: #1e5c3a;
  --green-2: #2a6a45;
  --shadow: #0000002a;
  --success: #52c98d;
  --glow: #1e5c3a33;
  --radius: 12px;

  /* قيم محفوظة للوضع النهاري (تُستخدم عبر body.light-mode أدناه) */
  --bg-light: #faf8f3;
  --card-light: #ffffff;
  --border-light: #c9bfa6;
  --gold-light-mode: #a17a45;
  --text-light: #2b3a2a;
  --text-muted-light: #5a6e54;
  --shadow-light: #0000001a;
  --glow-light: #3a9c6a18;
  --green-1-light: #2d8659;
  --green-2-light: #3aa06c;
}

/* الوضع النهاري: نعيد تعريف نفس المتغيرات المستخدمة في كل مكان،
   فلا حاجة لتكرار override لكل عنصر على حدة */
body.light-mode {
  --bg: var(--bg-light);
  --card: var(--card-light);
  --border: var(--border-light);
  --gold: var(--gold-light-mode);
  --text: var(--text-light);
  --text-muted: var(--text-muted-light);
  --shadow: var(--shadow-light);
  --glow: var(--glow-light);
  --green-1: var(--green-1-light);
  --green-2: var(--green-2-light);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
  transition: background .4s ease, color .4s ease;
}

/* Light mode */
/* Ambient glow effect */
body::before {
  content: '';
  position: fixed;
  top: -300px;
  right: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(ellipse 400px 250px, var(--glow) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  transition: background .4s ease;
}

/* ─────── HEADER ───────── */
header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 48px 20px 32px;
}

.basmala {
  font-family: 'Noto Kufi Arabic', serif;
  font-size: clamp(32px, 7vw, 48px);
  color: var(--gold);
  letter-spacing: 0.08em;
  margin-bottom: 12px;
  text-shadow: 0 0 30px var(--gold);
  font-weight: 700;
}

.title {
  font-family: 'Noto Kufi Arabic', serif;
  font-size: clamp(22px, 5vw, 36px);
  color: var(--text);
  margin-bottom: 8px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 24px;
  font-weight: 400;
}

.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin: 0 auto 12px;
  max-width: 500px;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(to left, transparent, var(--gold), transparent);
}

.divider-dot {
  width: 8px;
  height: 8px;
  background: var(--gold);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--gold);
}

/* ─────── TOOLBAR ───────── */
.nav-wrap {
  position: sticky;
  top: 0;
  z-index: 99;
  background: linear-gradient(to bottom, var(--bg), var(--bg) 90%, transparent);
  transition: background .4s ease;
  padding: 12px 0;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px 10px;
  max-width: 800px;
  margin: 0 auto;
}

.search-wrap {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
}

.search-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 14px;
  padding: 10px 40px 10px 16px;
  border-radius: 50px;
  outline: none;
  transition: all .2s ease;
}

.search-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(184, 149, 106, 0.15);
}

.search-input::placeholder {
  color: var(--text-muted);
  opacity: 0.65;
}

.search-btn {
  position: absolute;
  left: 12px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  padding: 6px;
  transition: color .2s ease;
}

.search-btn:hover {
  color: var(--gold);
}

.search-clear {
  display: none;
  position: absolute;
  left: 12px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  transition: color .2s ease;
}

.search-clear:hover {
  color: var(--gold);
}

.theme-toggle {
  width: 40px;
  height: 40px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--gold);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s ease;
  flex-shrink: 0;
}

.theme-toggle:hover {
  border-color: var(--gold);
  transform: scale(1.08);
}

.theme-toggle:active {
  transform: scale(0.96);
}

/* ─────── TABS ───────── */
.nav-tabs {
  display: flex;
  gap: 8px;
  padding: 0 16px;
  max-width: 800px;
  margin: 0 auto;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
}

.nav-tabs::-webkit-scrollbar {
  display: none;
}

.tab-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 13px;
  padding: 8px 18px;
  border-radius: 50px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s ease;
  flex-shrink: 0;
}

.tab-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.tab-btn.active {
  background: linear-gradient(135deg, var(--green-1), var(--green-2));
  border-color: var(--gold);
  color: #e8d9b8;
  box-shadow: 0 0 12px rgba(184, 149, 106, 0.25);
}

/* ─────── SECTIONS ───────── */
.section {
  display: none;
  animation: fadeIn .3s ease;
}

.section.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.main-content {
  padding: 20px 16px;
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.sec-header {
  text-align: center;
  padding: 16px 20px;
  background: linear-gradient(135deg, rgba(30, 92, 58, 0.12), rgba(42, 106, 69, 0.08));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 24px;
  font-family: 'Noto Kufi Arabic', serif;
  font-size: clamp(15px, 3vw, 18px);
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 0.01em;
  transition: all .2s ease;
}

/* ─────── DUA CARDS ───────── */
.dua-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  transition: all .2s ease;
  position: relative;
}

.dua-card:hover {
  border-color: var(--gold);
  box-shadow: 0 4px 16px var(--shadow);
}

.dua-text {
  font-size: clamp(15px, 2.8vw, 18px);
  line-height: 2;
  color: var(--text);
  margin-bottom: 12px;
  text-align: right;
  font-weight: 500;
}

.dua-source {
  font-size: 12px;
  color: var(--gold);
  text-align: center;
  opacity: 0.85;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  margin-top: 12px;
}

.dua-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}

.dua-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 50px;
  cursor: pointer;
  transition: all .2s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}

.dua-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.dua-btn.success {
  border-color: var(--success);
  color: var(--success);
}

.dua-btn.error {
  border-color: #e07856;
  color: #e07856;
}

/* ─────── TASBIH CARDS ───────── */
.tasbih-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.tasbih-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  transition: all .2s ease;
}

.tasbih-card:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px var(--shadow);
}

.tasbih-title {
  font-family: 'Noto Kufi Arabic', serif;
  font-size: clamp(14px, 2.5vw, 16px);
  color: var(--gold);
  text-align: center;
  line-height: 1.7;
  font-weight: 600;
}

.tasbih-note {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  margin-top: -8px;
}

.counter-container {
  display: flex;
  align-items: center;
  gap: 14px;
}

.counter-display {
  font-family: 'Noto Kufi Arabic', serif;
  font-size: clamp(40px, 8vw, 56px);
  color: var(--gold);
  min-width: 70px;
  text-align: center;
  text-shadow: 0 0 20px rgba(184, 149, 106, 0.4);
  transition: transform .1s ease, color .1s ease;
  line-height: 1;
  font-weight: 700;
}

.counter-display.pop {
  animation: counterPop .2s ease;
  color: var(--gold-light);
}

@keyframes counterPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.count-btn {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--green-1), var(--green-2));
  border: 2px solid var(--gold);
  border-radius: 50%;
  color: #e8d9b8;
  font-size: 26px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s ease;
  box-shadow: 0 0 12px rgba(184, 149, 106, 0.2);
  flex-shrink: 0;
  font-weight: bold;
}

.count-btn:hover {
  box-shadow: 0 0 20px rgba(184, 149, 106, 0.4);
  transform: scale(1.08);
}

.count-btn:active {
  transform: scale(0.92);
}

.progress-section {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
}

.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(to left, var(--gold), var(--accent));
  border-radius: 10px;
  transition: width .3s ease;
  width: 0%;
}

.progress-target {
  font-size: 11px;
  color: var(--text-muted);
  min-width: 40px;
  text-align: left;
}

.tasbih-footer {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
}

.reset-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 50px;
  cursor: pointer;
  transition: all .2s ease;
  flex-shrink: 0;
}

.reset-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.complete-badge {
  display: none;
  background: linear-gradient(135deg, rgba(82, 201, 141, 0.2), rgba(61, 166, 121, 0.15));
  border: 1px solid var(--success);
  border-radius: 50px;
  padding: 4px 12px;
  font-size: 11px;
  color: var(--success);
  font-weight: 600;
  animation: badgePop .3s ease;
}

@keyframes badgePop {
  0% { opacity: 0; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1); }
}

/* ─────── SEARCH RESULTS ───────── */
.search-results {
  display: none;
  padding: 20px 16px;
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.search-results.active {
  display: block;
  animation: fadeIn .3s ease;
}

.search-meta {
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
  margin-bottom: 20px;
  padding: 12px;
  background: var(--card);
  border-radius: var(--radius);
}

.search-empty {
  text-align: center;
  color: var(--text-muted);
  padding: 40px 20px;
  font-size: 14px;
}

.result-label {
  font-size: 11px;
  color: var(--gold);
  text-align: center;
  margin-bottom: 8px;
  opacity: 0.8;
  font-weight: 600;
}

mark {
  background: var(--gold);
  color: #1a1a1a;
  padding: 2px 4px;
  border-radius: 3px;
  font-weight: 600;
}

/* ─────── FOOTER ───────── */
footer {
  text-align: center;
  padding: 40px 20px 50px;
  color: var(--text-muted);
  font-size: 13px;
  position: relative;
  z-index: 1;
}

footer p {
  margin: 8px 0;
  line-height: 1.6;
}

footer .gold-text {
  color: var(--gold);
  font-weight: 600;
}

/* ─────── BACK TO TOP ───────── */
.back-to-top {
  position: fixed;
  bottom: 24px;
  left: 20px;
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--green-1), var(--green-2));
  border: 1.5px solid var(--gold);
  border-radius: 50%;
  color: #e8d9b8;
  font-size: 20px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 50;
  transition: all .3s ease;
  box-shadow: 0 4px 16px var(--shadow);
}

.back-to-top.show {
  display: flex;
}

.back-to-top:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(184, 149, 106, 0.3);
}

.back-to-top:active {
  transform: translateY(0);
}

/* ─────── RESPONSIVE ───────── */
@media (max-width: 600px) {
  .toolbar {
    padding: 0 12px 8px;
  }
  .nav-tabs {
    padding: 0 12px;
  }
  .tasbih-grid {
    grid-template-columns: 1fr;
  }
  .dua-btn {
    font-size: 11px;
    padding: 5px 12px;
  }
}

@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<header>
  <div class="basmala">﷽</div>
  <div class="divider"><div class="divider-line"></div><div class="divider-dot"></div><div class="divider-line"></div></div>
  <h1 class="title">ربَّنا يجعله خير</h1>
  <p class="subtitle">دعاءٌ جامعٌ شاملٌ كامل للدُّنيا والآخرة</p>
  <div class="divider"><div class="divider-line"></div><div class="divider-dot"></div><div class="divider-line"></div></div>
</header>

<div class="nav-wrap">
  <div class="toolbar">
    <button class="theme-toggle" id="themeToggle" aria-label="تبديل الوضع الليلي/النهاري">🌙</button>
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="ابحث في الأدعية…" aria-label="البحث">
      <button class="search-btn" id="searchBtn" aria-label="بحث">🔍</button>
      <button class="search-clear" id="searchClear" aria-label="مسح">✕</button>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
</div>

<div class="main-content">
  <div id="mainSections"></div>
  <div class="search-results" id="searchResults"></div>
</div>

<footer>
  <div class="divider"><div class="divider-line"></div><div class="divider-dot"></div><div class="divider-line"></div></div>
  <p>نسألكم الدُّعاء لنا ولأهلنا ولجميع المسلمين</p>
  <p class="gold-text">اللهمَّ صلِّ وسلِّم وبارك على سيِّدنا محمَّد وعلى آله وصحبه أجمعين</p>
</footer>

<button class="back-to-top" id="backToTop" aria-label="العودة لأعلى"></button>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// CORE DATA & STATE
// ══════════════════════════════════════════════════════════════════════════════

const SECTIONS = [
  {
    id:'hamd', label:'الحمد والثناء',
    title:'— الحمدُ والثَّناءُ على الله تعالى —',
    duas:[
      { text:'اللهمَّ لك الحمدُ كلُّه، ولك الشُّكرُ كلُّه، ولك المُلكُ كلُّه،\nوبيدك الخيرُ كلُّه، وإليك يَرجعُ الأمرُ كلُّه،\nأنت الأوَّل فلا شيءَ قبلك، والآخرُ فلا شيءَ بعدك،\nوالظَّاهرُ فلا شيءَ فوقك، والباطنُ فلا شيءَ دونك.', src:'صحيح مسلم' },
      { text:'الحمدُ لله ربِّ العالمين حمدًا كثيرًا طيِّبًا مباركًا فيه،\nكما يُحبُّ ربُّنا ويَرضى، وكما ينبغي لجلال وجهه وعظيم سلطانه.', src:'' },
      { text:'سبحانك اللهمَّ وبحمدك، وتباركَ اسمُك، وتعالى جَدُّك، ولا إله غيرك.', src:'' },
      { text:'اللهمَّ لك الحمدُ ملءَ السَّماوات وملءَ الأرض،\nوملءَ ما شئتَ من شيءٍ بعد،\nلا مانعَ لما أعطيت ولا مُعطيَ لما منعت،\nولا ينفعُ ذا الجَدِّ منك الجَدُّ.', src:'متفق عليه' },
      { text:'سبحانَ الله وبحمده، سبحانَ الله العظيم.\nسبحانَ الله والحمدُ لله ولا إله إلا الله والله أكبر،\nولا حولَ ولا قوَّةَ إلا بالله العليِّ العظيم.', src:'' },
      { text:'الحمدُ لله الذي بنعمتِه تتمُّ الصَّالحات.', src:'صحيح ابن ماجه' },
      { text:'اللهمَّ لا أُحصي ثناءً عليك، أنتَ كما أثنيتَ على نفسِك.', src:'صحيح مسلم' },
      { text:'الحمدُ لله على كلِّ حالٍ، والحمدُ لله ربِّ العالمين.', src:'صحيح ابن ماجه' },
      { text:'سبحانَ ربِّك ربِّ العزَّة عمَّا يَصِفون، وسلامٌ على المُرسَلين،\nوالحمدُ لله ربِّ العالمين.', src:'سورة الصَّافَّات: ١٨٠–١٨٢' },
    ]
  },
  {
    id:'salah', label:'الصلاة على النبي',
    title:'— الصَّلاةُ والسَّلامُ على النَّبيِّ ﷺ —',
    duas:[

      { text:'لا إله إلَّا أنتَ سبحانَك إنِّي كنتُ من الظَّالمين.', src:'لم يَدعُ به مسلمٌ إلَّا استُجيب له — صحيح الترمذي' },
      { text:'يا حيُّ يا قيُّومُ برحمتِك أستغيث،\nأصلِح لي شأني كلَّه ولا تَكِلني إلى نفسي طرفةَ عين.', src:'صحيح الحاكم' },
      { text:'اللهمَّ اغفر لي وارحمني واهدِني وارزُقني وعافِني.', src:'جمَع فيها النَّبيُّ ﷺ خيرَ الدُّنيا والآخرة — صحيح مسلم' },
      { text:'اللهمَّ إنِّي أعوذُ برضاك من سَخَطِك وبمعافاتِك من عقوبتِك،\nوأعوذُ بك منك، لا أُحصي ثناءً عليك أنتَ كما أثنيتَ على نفسِك.', src:'من أعظم أدعية النَّبيِّ ﷺ — صحيح مسلم' },
      { text:'رضيتُ بالله ربًّا وبالإسلام دينًا وبمحمَّدٍ ﷺ نبيًّا ورسولًا.', src:'من قالها ثلاثًا صباحًا ومساءً كان حقًّا على الله أن يُرضيَه — صحيح الترمذي' },
      { text:'لا تُؤاخذنا إن نسينا أو أخطأنا،\nربَّنا ولا تحمِل علينا إصرًا كما حملتَه على الذين من قبلِنا،\nربَّنا ولا تُحمِّلنا ما لا طاقةَ لنا به،\nواعفُ عنَّا واغفر لنا وارحمنا، أنتَ مولانا فانصُرنا على القوم الكافرين.', src:'سورة البقرة: ٢٨٦ — استجابها الله بنفسه' },
      { text:'اللهمَّ إنِّي أسألُك موجباتِ رحمتِك وعزائمَ مغفرتِك،\nوالغنيمةَ من كلِّ بِرٍّ والسَّلامةَ من كلِّ إثم.', src:'صحيح الحاكم' },
      { text:'سبحانَك اللهمَّ وبحمدِك، أشهدُ أن لا إله إلَّا أنت،\nأستغفرُك وأتوبُ إليك.', src:'كفَّارةُ المجلس — صحيح الترمذي وأبو داود' },
      { text:'لا إله إلَّا الله، وحدَه لا شريكَ له، له المُلكُ وله الحمدُ،\nيُحيي ويُميتُ وهو حيٌّ لا يموت، بيدِه الخيرُ وهو على كلِّ شيءٍ قدير.', src:'صحيح مسلم — عدلُ عَتاقةِ عشرِ رقاب' },

      { text:'يا حيُّ يا قيُّوم برحمتِك أستغيث', note:'كان يُكثر منها النَّبيُّ ﷺ', src:'صحيح الترمذي' },
      { text:'رضيتُ بالله ربًّا وبالإسلام دينًا\nوبمحمَّدٍ ﷺ نبيًّا ورسولًا', note:'حقٌّ على الله أن يُرضيَه', src:'صحيح الترمذي' },
      { text:'اللهمَّ اغفر لي وارحمني واهدِني وارزُقني وعافِني', note:'جمَع فيها النَّبيُّ ﷺ خيرَ الدُّنيا والآخرة', src:'صحيح مسلم' },
    ]
  },
];

// ══════════════════════════════════════════════════════════════════════════════
// UI STATE MANAGEMENT
// ══════════════════════════════════════════════════════════════════════════════

const state = {
  currentTab: SECTIONS[0].id,
  counters: {},
  theme: localStorage.getItem('dua-theme') || 'dark',
  searchQuery: '',
};

// Apply theme on load
document.documentElement.getAttribute;
if (state.theme === 'light') document.body.classList.add('light-mode');

// ══════════════════════════════════════════════════════════════════════════════
// INITIALIZATION
// ══════════════════════════════════════════════════════════════════════════════

const mainSections = document.getElementById('mainSections');
const navTabs = document.getElementById('navTabs');
const searchResults = document.getElementById('searchResults');
const searchInput = document.getElementById('searchInput');
const themeToggle = document.getElementById('themeToggle');
const backToTop = document.getElementById('backToTop');
const searchClear = document.getElementById('searchClear');

function toArabicNum(n) {
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

function renderSections() {
  mainSections.innerHTML = '';
  SECTIONS.forEach((sec, si) => {
    const section = document.createElement('div');
    section.className = 'section' + (si === 0 ? ' active' : '');
    section.id = 'sec-' + sec.id;

    const header = document.createElement('div');
    header.className = 'sec-header';
    header.textContent = sec.title;
    section.appendChild(header);

    if (sec.type === 'tasbih') {
      const grid = document.createElement('div');
      grid.className = 'tasbih-grid';
      sec.items.forEach((item, idx) => {
        const key = sec.id + '-' + idx;
        state.counters[key] = loadCounter(key);
        grid.appendChild(buildTasbihCard(item, key, sec.label));
      });
      section.appendChild(grid);
    } else {
      sec.duas.forEach(dua => {
        section.appendChild(buildDuaCard(dua, sec.label));
      });
    }

    mainSections.appendChild(section);
  });
}

function renderTabs() {
  navTabs.innerHTML = '';
  SECTIONS.forEach((sec, si) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (si === 0 ? ' active' : '');
    btn.textContent = sec.label;
    btn.onclick = () => switchTab(sec.id);
    navTabs.appendChild(btn);
  });
}

function buildDuaCard(dua, sectionLabel) {
  const card = document.createElement('div');
  card.className = 'dua-card';

  const text = document.createElement('div');
  text.className = 'dua-text';
  text.innerHTML = dua.text.replace(/\n/g, '<br>');
  card.appendChild(text);

  if (dua.src) {
    const src = document.createElement('div');
    src.className = 'dua-source';
    src.textContent = dua.src;
    card.appendChild(src);
  }

  const actions = document.createElement('div');
  actions.className = 'dua-actions';

  const copyBtn = document.createElement('button');
  copyBtn.className = 'dua-btn';
  copyBtn.innerHTML = '📋 نسخ';
  copyBtn.onclick = (e) => {
    e.preventDefault();
    e.stopPropagation();
    const fullText = dua.text + (dua.src ? `\n— ${dua.src} —` : '');
    copyToClipboard(fullText, copyBtn);
  };

  const shareBtn = document.createElement('button');
  shareBtn.className = 'dua-btn';
  shareBtn.innerHTML = '📤 مشاركة';
  shareBtn.onclick = (e) => {
    e.preventDefault();
    e.stopPropagation();
    const fullText = dua.text + (dua.src ? `\n— ${dua.src} —` : '');
    shareText(fullText, shareBtn);
  };

  actions.appendChild(copyBtn);
  actions.appendChild(shareBtn);
  card.appendChild(actions);

  return card;
}

function showCopyFeedback(btn, ok) {
  const original = btn.dataset.originalLabel || btn.innerHTML;
  btn.dataset.originalLabel = original;
  if (ok) {
    btn.classList.add('success');
    btn.classList.remove('error');
    btn.innerHTML = '✓ تم النَّسخ';
  } else {
    btn.classList.add('error');
    btn.classList.remove('success');
    btn.innerHTML = '⚠ انسخ يدويًا';
  }
  clearTimeout(btn._copyResetTimer);
  btn._copyResetTimer = setTimeout(() => {
    btn.classList.remove('success', 'error');
    btn.innerHTML = original;
  }, ok ? 1500 : 2500);
}

function copyToClipboard(text, btn) {
  // المحاولة الأولى: الـ Clipboard API الحديث (يتطلب سياقًا آمنًا https/localhost)
  if (navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => showCopyFeedback(btn, true))
      .catch(() => fallbackCopy(text, btn));
  } else {
    fallbackCopy(text, btn);
  }
}

function fallbackCopy(text, btn) {
  const el = document.createElement('textarea');
  el.value = text;
  // إبقاء العنصر داخل منطقة الرؤية فعليًا (بعض المتصفحات على الموبايل ترفض select() على عناصر بعيدة تمامًا عن الشاشة)
  el.style.position = 'fixed';
  el.style.top = '0';
  el.style.left = '0';
  el.style.width = '2px';
  el.style.height = '2px';
  el.style.padding = '0';
  el.style.border = 'none';
  el.style.outline = 'none';
  el.style.boxShadow = 'none';
  el.style.background = 'transparent';
  el.setAttribute('readonly', '');
  document.body.appendChild(el);

  let ok = false;
  try {
    el.focus();
    el.select();
    el.setSelectionRange(0, text.length); // ضروري على iOS Safari
    ok = document.execCommand('copy');
  } catch (err) {
    ok = false;
  }
  document.body.removeChild(el);

  if (ok) {
    showCopyFeedback(btn, true);
  } else {
    // فشل النسخ التلقائي تمامًا: لا نسكت — نعرض النص للمستخدم لينسخه يدويًا
    showCopyFeedback(btn, false);
    promptManualCopy(text);
  }
}

function promptManualCopy(text) {
  // حل أخير: نافذة بسيطة بالنص جاهز للتحديد والنسخ يدويًا، تعمل في كل الحالات بدون أي صلاحيات
  window.prompt('انسخ النَّص التالي يدويًا (تحديد + نسخ):', text);
}

function shareText(text, btn) {
  if (navigator.share) {
    navigator.share({
      text: text,
      title: 'ربنا يجعله خير'
    }).catch(() => {});
  } else {
    copyToClipboard(text, btn);
  }
}

function buildTasbihCard(item, key, sectionLabel) {
  const card = document.createElement('div');
  card.className = 'tasbih-card';

  const title = document.createElement('div');
  title.className = 'tasbih-title';
  title.innerHTML = item.text.replace(/\n/g, '<br>');
  card.appendChild(title);

  const note = document.createElement('div');
  note.className = 'tasbih-note';
  note.textContent = item.note + ' — ' + item.src;
  card.appendChild(note);

  const current = state.counters[key] || 0;

  const container = document.createElement('div');
  container.className = 'counter-container';

  const display = document.createElement('div');
  display.className = 'counter-display';
  display.id = 'num-' + key;
  display.textContent = toArabicNum(current);

  const btn = document.createElement('button');
  btn.className = 'count-btn';
  btn.innerHTML = '+';
  btn.onclick = () => increment(key, item, display, bar, badge);

  container.appendChild(display);
  container.appendChild(btn);
  card.appendChild(container);

  const footer = document.createElement('div');
  footer.className = 'progress-section';

  const bar = document.createElement('div');
  bar.className = 'progress-bar';

  const fill = document.createElement('div');
  fill.className = 'progress-fill';
  fill.id = 'bar-' + key;
  fill.style.width = Math.min(100, (current / 100) * 100) + '%';
  bar.appendChild(fill);

  const target = document.createElement('div');
  target.className = 'progress-target';
  target.textContent = '/ ١٠٠';

  footer.appendChild(bar);
  footer.appendChild(target);

  const tasbihFooter = document.createElement('div');
  tasbihFooter.className = 'tasbih-footer';

  const resetBtn = document.createElement('button');
  resetBtn.className = 'reset-btn';
  resetBtn.textContent = 'إعادة';
  resetBtn.onclick = () => reset(key, display, fill, badge);

  const badge = document.createElement('div');
  badge.className = 'complete-badge';
  badge.id = 'badge-' + key;
  badge.textContent = '✓ اكتمل';
  if (current >= 100) badge.style.display = 'inline-block';

  tasbihFooter.appendChild(resetBtn);
  tasbihFooter.appendChild(badge);
  footer.appendChild(tasbihFooter);
  card.appendChild(footer);

  return card;
}

function loadCounter(key) {
  try {
    return parseInt(localStorage.getItem('dua-counter-' + key)) || 0;
  } catch (e) {
    return 0;
  }
}

function saveCounter(key, value) {
  try {
    localStorage.setItem('dua-counter-' + key, value);
  } catch (e) {}
}

let audioContext;
function playBeep() {
  try {
    audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
    const t = audioContext.currentTime;
    [[880, 0], [1175, 0.16]].forEach(([freq, delay]) => {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t + delay);
      gain.gain.linearRampToValueAtTime(0.12, t + delay + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.25);
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.start(t + delay);
      osc.stop(t + delay + 0.26);
    });
  } catch (e) {}
}

function increment(key, item, numEl, barEl, badgeEl) {
  state.counters[key]++;
  saveCounter(key, state.counters[key]);
  numEl.textContent = toArabicNum(state.counters[key]);
  numEl.classList.add('pop');
  setTimeout(() => numEl.classList.remove('pop'), 200);

  const pct = Math.min(100, (state.counters[key] / 100) * 100);
  barEl.style.width = pct + '%';

  if (state.counters[key] === 100) {
    badgeEl.style.display = 'inline-block';
    if (navigator.vibrate) navigator.vibrate([30, 20, 30]);
    playBeep();
  }
}

function reset(key, numEl, barEl, badgeEl) {
  state.counters[key] = 0;
  saveCounter(key, 0);
  numEl.textContent = '٠';
  barEl.style.width = '0%';
  badgeEl.style.display = 'none';
}

function switchTab(id) {
  state.currentTab = id;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', SECTIONS[i].id === id);
  });
  document.querySelectorAll('.section').forEach(sec => {
    sec.classList.toggle('active', sec.id === 'sec-' + id);
  });
  const idx = SECTIONS.findIndex(s => s.id === id);
  navTabs.children[idx]?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function doSearch(query) {
  query = query.trim();
  if (!query) {
    mainSections.style.display = '';
    searchResults.classList.remove('active');
    searchClear.style.display = 'none';
    return;
  }

  searchClear.style.display = 'block';
  mainSections.style.display = 'none';
  searchResults.classList.add('active');
  searchResults.innerHTML = '';

  let matches = [];
  const lowerQuery = query.toLowerCase();
  SECTIONS.forEach(sec => {
    if (sec.type === 'tasbih') {
      sec.items.forEach(it => {
        if (it.text.includes(query) || (it.src && it.src.includes(query))) {
          matches.push({ text: it.text, src: it.src, label: sec.label, isTaskbih: true });
        }
      });
    } else {
      sec.duas.forEach(d => {
        if (d.text.includes(query) || (d.src && d.src.includes(query))) {
          matches.push({ text: d.text, src: d.src, label: sec.label });
        }
      });
    }
  });

  const meta = document.createElement('div');
  meta.className = 'search-meta';
  meta.textContent = matches.length ? toArabicNum(matches.length) + ' نتيجة لـ "' + query + '"' : '';
  searchResults.appendChild(meta);

  if (!matches.length) {
    const empty = document.createElement('div');
    empty.className = 'search-empty';
    empty.textContent = 'لا توجد نتائج لـ "' + query + '"';
    searchResults.appendChild(empty);
    return;
  }

  matches.forEach(m => {
    const label = document.createElement('div');
    label.className = 'result-label';
    label.textContent = '◆ ' + m.label;
    searchResults.appendChild(label);

    const card = document.createElement('div');
    card.className = 'dua-card';

    const text = document.createElement('div');
    text.className = 'dua-text';
    const highlighted = m.text.replace(new RegExp(query, 'gi'), '<mark>$&</mark>');
    text.innerHTML = highlighted.replace(/\n/g, '<br>');
    card.appendChild(text);

    if (m.src) {
      const src = document.createElement('div');
      src.className = 'dua-source';
      src.textContent = m.src;
      card.appendChild(src);
    }

    searchResults.appendChild(card);
  });
}

// Event listeners
themeToggle.addEventListener('click', () => {
  const isLight = document.body.classList.contains('light-mode');
  document.body.classList.toggle('light-mode');
  const newTheme = isLight ? 'dark' : 'light';
  themeToggle.textContent = newTheme === 'light' ? '☀️' : '🌙';
  try { localStorage.setItem('dua-theme', newTheme); } catch (e) {}
});

searchInput.addEventListener('input', () => doSearch(searchInput.value));
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  doSearch('');
  searchInput.focus();
});

window.addEventListener('scroll', () => {
  backToTop.classList.toggle('show', window.scrollY > 400);
});

backToTop.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// Initialize
renderTabs();
renderSections();
themeToggle.textContent = state.theme === 'light' ? '☀️' : '🌙';
</script>
